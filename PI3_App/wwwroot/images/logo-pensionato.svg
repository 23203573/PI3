<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800">
  <defs>
    <linearGradient id="mainGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#C76E4A;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#E8B059;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E8B059;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="houseGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#C76E4A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E8B059;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Outer curved ring -->
  <path d="M 400,40 Q 720,40 720,400 Q 720,720 400,720 Q 120,720 80,400 Q 80,120 360,80 Q 680,80 680,320 Q 680,560 400,600 Q 200,600 160,400 Q 160,200 320,160" 
        fill="none" stroke="url(#mainGrad)" stroke-width="50" stroke-linecap="round"/>
  
  <!-- House structure centered -->
  <g transform="translate(400, 380)">
    <!-- Main house base -->
    <rect x="-75" y="-20" width="150" height="100" fill="url(#houseGrad)" rx="6"/>
    
    <!-- Roof triangle -->
    <polygon points="-85,-25 0,-90 85,-25" fill="url(#houseGrad)"/>
    
    <!-- Small chimney -->
    <rect x="45" y="-75" width="18" height="35" fill="url(#houseGrad)"/>
    
    <!-- Window with cross pattern -->
    <g transform="translate(0, 15)">
      <!-- Window frame -->
      <rect x="-18" y="-18" width="36" height="36" fill="#FFFFFF" rx="3"/>
      <!-- Arched top -->
      <path d="M -18,-18 Q 0,-28 18,-18" fill="#FFFFFF"/>
      <!-- Cross pattern -->
      <line x1="0" y1="-18" x2="0" y2="18" stroke="url(#houseGrad)" stroke-width="2.5"/>
      <line x1="-18" y1="0" x2="18" y2="0" stroke="url(#houseGrad)" stroke-width="2.5"/>
      <!-- Arched frame -->
      <path d="M -15,-20 Q 0,-25 15,-20" fill="none" stroke="url(#houseGrad)" stroke-width="1.5"/>
    </g>
  </g>
  
  <!-- Decorative curved elements -->
  <path d="M 120,300 Q 200,250 280,320 Q 340,380 380,360" 
        fill="none" stroke="url(#mainGrad)" stroke-width="25" stroke-linecap="round" opacity="0.7"/>
  
  <path d="M 680,500 Q 600,550 520,480 Q 460,420 420,440" 
        fill="none" stroke="url(#mainGrad)" stroke-width="25" stroke-linecap="round" opacity="0.7"/>
</svg>